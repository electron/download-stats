# faraday trust configuration for electron/download-stats.
# A bot listed here is "trusted" and its paired `approvers` may stand in
# for a human review on its PRs only.
# See: https://github.com/electron/faraday

trusted-bots:
  # Daily download statistics updates, verified and approved by
  # electron-pr-approver.
  - login: electron-download-statistician[bot]
    id: 144944860
    approvers:
      - login: electron-pr-approver[bot]
        id: 237345921
